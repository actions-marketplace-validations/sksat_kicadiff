<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>KiCad Diff</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e1e;color:#ccc;font-family:system-ui,sans-serif;font-size:13px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:6px 12px;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0}
header h1{font-size:13px;font-weight:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:2px;margin-left:auto;flex-shrink:0}
.tabs button{padding:4px 10px;background:#333;border:1px solid #555;color:#ccc;cursor:pointer;font-size:12px;border-radius:3px}
.tabs button.active{background:#007acc;border-color:#007acc;color:#fff}

/* --- Layer panel (KiCad/Photoshop style) ---
   Eye icon: toggles visibility independently
   Row click: selects active layer (rendered on top via z-index boost) */
.layer-panel{display:flex;align-items:stretch;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0}
.layer-list{display:flex;flex-direction:column;min-width:160px;border-right:1px solid #3c3c3c;max-height:180px;overflow-y:auto}
.layer-row{display:flex;align-items:center;gap:6px;padding:2px 8px;cursor:pointer;user-select:none;font-size:12px;border-left:3px solid transparent}
.layer-row:hover{background:#2a2d2e}
.layer-row.active{background:#094771;border-left-color:#007acc}
.layer-row .eye{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.7;flex-shrink:0}
.layer-row .eye:hover{opacity:1}
.layer-row .eye.hidden{opacity:.3}
.layer-row .swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.layer-row .lname{flex:1}
.layer-extras{display:flex;align-items:center;gap:12px;padding:4px 12px;font-size:12px}
.layer-extras label{display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
.lbl-before{color:#f48771}.lbl-after{color:#89d185}

.main{flex:1;overflow:hidden;position:relative}

/* --- Views --- */
.view{display:none;width:100%;height:100%}
.view.active{display:flex}

/* --- Side by side --- */
.sbs{flex-direction:row}
.sbs .pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sbs .pane+.pane{border-left:2px solid #007acc}
.pane-label{font-size:11px;font-weight:600;padding:3px 8px;text-align:center;flex-shrink:0}
.pane-label.before{background:#3e2020;color:#f48771}
.pane-label.after{background:#203e20;color:#89d185}
.pane-body{flex:1;overflow:auto;display:flex;justify-content:center;padding:4px}

/* --- Layer stack ---
   Layers are stacked with position:absolute. The first visible layer stays
   position:static to act as a "sizer" that gives the container its dimensions.
   background:#1e1e1e ensures semi-transparent layers composite against a
   solid dark background, preventing bleed-through in overlay/swipe modes.
   isolation:isolate contains layer z-indexes within the stack. */
.layer-stack{position:relative;display:inline-block;background:#1e1e1e;isolation:isolate}
.layer-stack img{display:block;max-width:100%;height:auto}
.layer-stack img.layer{position:absolute;top:0;left:0;max-width:100%;height:auto;pointer-events:none}

/* --- Overlay/Swipe shared layout ---
   compare-wrap uses width:100% (not max-width) so the container always tracks
   the viewport width on resize. Without this, inline-block + max-width can get
   "stuck" at a cached intrinsic size when the viewport is enlarged.
   layer-stack uses max-width:100% + margin:auto to scale down for large images
   while staying centered when the viewport is wider than the image. */
.compare-wrap{position:relative;width:100%}
.compare-wrap .layer-stack{display:block;max-width:100%;margin:0 auto}
/* over-stack sits on top of the base layer-stack, same dimensions.
   background:#1e1e1e prevents the base from bleeding through
   semi-transparent layers in the overlay. */
.compare-wrap .over-stack{position:absolute;top:0;left:0;width:100%;height:100%;background:#1e1e1e}
.compare-wrap .over-stack .layer-stack{width:100%;max-width:100%}

/* --- Overlay ---
   Same layout pattern as side-by-side: flex-direction:column with a
   fixed-height controls bar on top and a flex:1 scrollable body below.
   This ensures correct resize behavior (matching the pane-body approach). */
.ovl{flex-direction:column;overflow:hidden}
.ovl-controls{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:#2d2d2d;border-bottom:1px solid #3c3c3c;font-size:12px}
.ovl-controls input[type=range]{width:200px;accent-color:#007acc}
/* Scrollable image area, same structure as .pane-body in side-by-side. */
.ovl-body{flex:1;overflow:auto;display:flex;justify-content:center;padding:4px}

/* --- Swipe ---
   After is the base, before is overlaid with clip-path:inset() to reveal
   only the left portion. This avoids the overflow:hidden + width-sync
   approach which breaks on resize and causes bleed-through.
   Same flex:column + scrollable body pattern as overlay.
   Divider is a direct child of the swp view (not compare-wrap) so it
   spans the full height including the controls bar. The handle sits in
   the controls bar area so it doesn't obscure the image. */
.swp{flex-direction:column;overflow:hidden;position:relative}
/* Controls bar: same height as overlay's, provides visual space for the
   swipe handle and aligns the image start position with overlay mode. */
.swp-controls{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:#2d2d2d;border-bottom:1px solid #3c3c3c;font-size:12px;cursor:col-resize}
.swp-body{flex:1;overflow:auto;display:flex;justify-content:center;padding:4px;cursor:col-resize}
/* Divider spans the entire swp view height (controls bar + image body).
   Positioned as a direct child of swp (not compare-wrap) so it extends
   into the controls bar. Left position is computed in JS based on
   compare-wrap's offset to handle centering correctly. */
.swp>.divider{position:absolute;top:0;width:3px;height:100%;background:#007acc;z-index:9999;pointer-events:none}
/* Handle sits in the controls bar area (top:3px aligns with bar padding). */
.swp>.divider::after{content:"\25C0\25B6";position:absolute;top:3px;left:50%;transform:translateX(-50%);background:#007acc;color:#fff;padding:3px 3px;border-radius:4px;font-size:10px;white-space:nowrap}

/* --- Diff highlight ---
   Overlay from ImageMagick compare, shown via mix-blend-mode. */
.diff-overlay{position:absolute;top:0;left:0;max-width:100%;height:auto;pointer-events:none;mix-blend-mode:multiply}
</style>
</head><body>

<header>
  <h1 id="title"></h1>
  <div class="tabs" id="view-tabs"></div>
</header>
<div class="layer-panel" id="layer-panel" style="display:none">
  <div class="layer-list" id="layer-list"></div>
  <div class="layer-extras" id="layer-extras"></div>
</div>
<div class="main" id="main"></div>

<script>
/* MANIFEST is injected as a <script> tag by render.sh before this file.
   It contains paths to all generated images (combined, per-layer, diff).
   Guard against opening the HTML directly without injection. */
if (!window.MANIFEST) {
  document.body.style.cssText = 'display:flex;align-items:center;justify-content:center;color:#f48771';
  document.body.textContent = 'Error: MANIFEST not found. This file must be generated by render.sh.';
  throw new Error('missing MANIFEST');
}
const M = window.MANIFEST;
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// --- State ---
let currentView = 'sbs';
let layerVisible = {};  // layer name -> bool (eye icon toggle)
let activeLayer = null; // selected layer name (gets z-index boost to top)
let showDiff = false;
let swipePct = 50;      // swipe divider position in percent

/* Base z-order: bottom to top. The active layer is boosted above all others
   but keeps the same opacity — matching KiCad's behavior where the active
   layer is on top but equally semi-transparent. */
const LAYER_ORDER = ['Edge.Cuts','B.Silkscreen','B.Cu','F.Cu','F.Silkscreen'];
const LAYER_COLORS = {
  'F.Cu':'#c83232','B.Cu':'#3232c8','F.Silkscreen':'#c8c832',
  'B.Silkscreen':'#32c8c8','Edge.Cuts':'#c8c864'
};

// --- Init ---
function init() {
  $('#title').textContent = M.file;
  document.title = 'KiCad Diff: ' + M.file;
  buildTabs();
  buildLayerPanel();
  buildViews();
  setView('sbs');
}

function buildTabs() {
  const tabs = $('#view-tabs');
  const modes = [['sbs','Side by Side']];
  if (M.hasBefore) modes.push(['ovl','Overlay'],['swp','Swipe']);
  modes.forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.dataset.view = id;
    btn.onclick = () => setView(id);
    tabs.appendChild(btn);
  });
}

/* Layer panel: KiCad/Photoshop-style layer list.
   - Eye icon click: toggles visibility (independent of selection)
   - Row click: selects as active layer (rendered on top, same opacity) */
function buildLayerPanel() {
  if (M.type !== 'pcb' || !M.after.layers) return;
  const panel = $('#layer-panel');
  panel.style.display = 'flex';
  const list = $('#layer-list');
  const available = LAYER_ORDER.filter(n => M.after.layers[n]);

  available.forEach(name => {
    layerVisible[name] = true;
    const row = document.createElement('div');
    row.className = 'layer-row';
    row.dataset.layer = name;

    const eye = document.createElement('div');
    eye.className = 'eye';
    eye.textContent = '\u{1F441}';
    eye.title = 'Toggle visibility';
    eye.addEventListener('click', e => {
      e.stopPropagation(); // Don't trigger row selection
      layerVisible[name] = !layerVisible[name];
      eye.classList.toggle('hidden', !layerVisible[name]);
      applyLayers();
    });

    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.style.background = LAYER_COLORS[name] || '#888';

    const lname = document.createElement('div');
    lname.className = 'lname';
    lname.textContent = name;

    row.appendChild(eye);
    row.appendChild(swatch);
    row.appendChild(lname);
    row.addEventListener('click', () => {
      // Toggle: click again to deselect
      activeLayer = (activeLayer === name) ? null : name;
      $$('.layer-row').forEach(r => r.classList.toggle('active', r.dataset.layer === activeLayer));
      applyLayers();
    });
    list.appendChild(row);
  });

  // Default active layer
  activeLayer = 'F.Cu';
  const defaultRow = list.querySelector('[data-layer="F.Cu"]');
  if (defaultRow) defaultRow.classList.add('active');

  // Diff highlight toggle
  const extras = $('#layer-extras');
  if (M.diff && M.hasBefore) {
    const diffLbl = document.createElement('label');
    const diffCb = document.createElement('input');
    diffCb.type = 'checkbox';
    diffCb.addEventListener('change', () => { showDiff = diffCb.checked; applyDiff(); });
    diffLbl.appendChild(diffCb);
    diffLbl.appendChild(document.createTextNode(' Diff highlight'));
    extras.appendChild(diffLbl);
  }
}

function setView(id) {
  currentView = id;
  $$('.view').forEach(v => v.classList.remove('active'));
  $$('#view-tabs button').forEach(b => b.classList.remove('active'));
  const el = $(`#view-${id}`);
  if (el) el.classList.add('active');
  const btn = $(`#view-tabs button[data-view="${id}"]`);
  if (btn) btn.classList.add('active');
  applyLayers();
  if (id === 'swp') requestAnimationFrame(() => positionSwipe());
}

// --- Build views ---
function buildViews() {
  const main = $('#main');
  main.innerHTML = '';

  // Side by side: panes with synchronized scrolling
  const sbs = document.createElement('div');
  sbs.id = 'view-sbs'; sbs.className = 'view sbs';
  if (M.hasBefore) sbs.appendChild(makePane('before', 'Before (HEAD)'));
  sbs.appendChild(makePane('after', M.hasBefore ? 'After (edited)' : 'Preview'));
  main.appendChild(sbs);

  // Synchronize scroll between side-by-side panes so the user
  // always sees the same region of the board in both panes.
  if (M.hasBefore) {
    const paneBodies = sbs.querySelectorAll('.pane-body');
    syncScroll([...paneBodies]);
  }

  if (!M.hasBefore) return;

  // Overlay: controls bar at top, scrollable image body below
  const ovl = document.createElement('div');
  ovl.id = 'view-ovl'; ovl.className = 'view ovl';
  const ovlCtrl = document.createElement('div');
  ovlCtrl.className = 'ovl-controls';
  ovlCtrl.innerHTML = '<span class="lbl-before">Before</span><input type="range" id="opacity-slider" min="0" max="100" value="100"><span class="lbl-after">After</span>';
  ovl.appendChild(ovlCtrl);
  const ovlBody = document.createElement('div');
  ovlBody.className = 'ovl-body';
  const ovlWrap = document.createElement('div');
  ovlWrap.className = 'compare-wrap';
  ovlWrap.appendChild(makeLayerStack('before', 'ovl-before'));
  const ovlOver = document.createElement('div');
  ovlOver.className = 'over-stack'; ovlOver.id = 'ovl-over';
  ovlOver.appendChild(makeLayerStack('after', 'ovl-after'));
  ovlWrap.appendChild(ovlOver);
  ovlBody.appendChild(ovlWrap);
  ovl.appendChild(ovlBody);
  main.appendChild(ovl);

  // Swipe: controls bar + scrollable body + full-height divider
  const swp = document.createElement('div');
  swp.id = 'view-swp'; swp.className = 'view swp';
  // Controls bar (matches overlay bar height so images start at same Y)
  const swpCtrl = document.createElement('div');
  swpCtrl.className = 'swp-controls';
  swpCtrl.innerHTML = '<span class="lbl-before">Before</span><span style="flex:1"></span><span class="lbl-after">After</span>';
  swp.appendChild(swpCtrl);
  // Scrollable image body
  const swpBody = document.createElement('div');
  swpBody.className = 'swp-body'; swpBody.id = 'swipe-body';
  const swpWrap = document.createElement('div');
  swpWrap.className = 'compare-wrap'; swpWrap.id = 'swipe-wrap';
  swpWrap.appendChild(makeLayerStack('after', 'swp-after'));
  const swpOver = document.createElement('div');
  swpOver.className = 'over-stack'; swpOver.id = 'swp-over';
  swpOver.appendChild(makeLayerStack('before', 'swp-before'));
  swpWrap.appendChild(swpOver);
  swpBody.appendChild(swpWrap);
  swp.appendChild(swpBody);
  // Divider: direct child of swp view so it spans full height (bar + image)
  const divider = document.createElement('div');
  divider.className = 'divider'; divider.id = 'swipe-divider';
  swp.appendChild(divider);
  main.appendChild(swp);

  // Overlay opacity slider
  $('#opacity-slider').addEventListener('input', e => {
    $('#ovl-over').style.opacity = e.target.value / 100;
  });
  setupSwipe();
  attachSwipeScrollHandler();
  applyLayers();
}

function makePane(side, label) {
  const pane = document.createElement('div');
  pane.className = 'pane';
  const lbl = document.createElement('div');
  lbl.className = 'pane-label ' + (side === 'before' ? 'before' : 'after');
  lbl.textContent = label;
  pane.appendChild(lbl);
  const body = document.createElement('div');
  body.className = 'pane-body';
  body.appendChild(makeLayerStack(side, `sbs-${side}`));
  pane.appendChild(body);
  return pane;
}

/* Build a stack of layer images for one side (before or after).
   All layer images start with .layer class (position:absolute).
   applyLayers() promotes the first visible one to position:static (sizer)
   so the container gets its dimensions from the image. */
function makeLayerStack(side, id) {
  const data = M[side];
  const stack = document.createElement('div');
  stack.className = 'layer-stack'; stack.id = id;

  if (data.layers && M.type === 'pcb') {
    LAYER_ORDER.forEach((name, i) => {
      if (!data.layers[name]) return;
      const img = document.createElement('img');
      img.src = data.layers[name];
      img.className = 'layer';
      img.dataset.layer = name; img.dataset.side = side;
      img.style.zIndex = i + 1;
      img.onerror = () => { img.style.display = 'none'; };
      stack.appendChild(img);
    });
  } else {
    const img = document.createElement('img');
    img.src = data.combined;
    img.onerror = () => { img.style.display = 'none'; };
    stack.appendChild(img);
  }

  // Diff highlight overlay (ImageMagick compare output)
  if (M.diff && side === 'after') {
    const diffImg = document.createElement('img');
    diffImg.src = M.diff;
    diffImg.className = 'layer diff-overlay';
    diffImg.style.zIndex = 200;
    diffImg.style.display = 'none';
    diffImg.dataset.diff = '1';
    stack.appendChild(diffImg);
  }

  return stack;
}

// --- Layer state application ---
/* All layers share the same opacity (0.6) regardless of active state.
   This matches KiCad's rendering where the active layer differs only
   in z-order (topmost), not in transparency. */
function applyLayers() {
  const maxBase = LAYER_ORDER.length;
  $$('.layer-stack img[data-layer]').forEach(img => {
    const name = img.dataset.layer;
    img.style.display = layerVisible[name] ? '' : 'none';
    const baseIdx = LAYER_ORDER.indexOf(name);
    img.style.zIndex = (name === activeLayer) ? maxBase + 10 : baseIdx + 1;
    img.style.opacity = '0.6';
  });

  /* Ensure one visible image per stack is position:static (sizer).
     Without a sizer, the inline-block container collapses to zero size. */
  $$('.layer-stack').forEach(stack => {
    const imgs = [...stack.querySelectorAll('img[data-layer]')];
    imgs.forEach(img => img.classList.add('layer'));
    const firstVisible = imgs.find(img => img.style.display !== 'none');
    if (firstVisible) firstVisible.classList.remove('layer');
  });
}

// --- Scroll sync ---
/* Synchronize scroll position across multiple elements (e.g. side-by-side panes).
   When one pane is scrolled, all others follow. A guard flag prevents
   infinite event loops between the scroll handlers. */
function syncScroll(elements) {
  let syncing = false;
  elements.forEach(source => {
    source.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      elements.forEach(target => {
        if (target !== source) {
          target.scrollTop = source.scrollTop;
          target.scrollLeft = source.scrollLeft;
        }
      });
      syncing = false;
    });
  });
}

function applyDiff() {
  $$('[data-diff]').forEach(img => {
    img.style.display = showDiff ? '' : 'none';
  });
}

// --- Swipe ---
/* Uses clip-path:inset() on the before overlay to reveal only the left
   portion. This is simpler and more resize-friendly than the overflow:hidden
   + width-sync approach, and avoids bleed-through at the clip boundary.
   The divider is a direct child of the swp view (not compare-wrap) so it
   spans the full height including the controls bar. Position is calculated
   relative to compare-wrap's bounds to handle centering correctly. */
function setupSwipe() {
  const swpView = $('#view-swp');
  const body = $('#swipe-body');
  if (!swpView || !body) return;
  let dragging = false;

  function onMove(clientX) {
    const wrap = $('#swipe-wrap');
    const bodyEl = $('#swipe-body');
    if (!wrap || !bodyEl) return;
    // Account for horizontal scroll: clientX is viewport-relative, but we
    // need position relative to the full image width (not just visible portion).
    const rect = wrap.getBoundingClientRect();
    const x = clientX - rect.left + bodyEl.scrollLeft;
    const fullWidth = wrap.scrollWidth;
    const pct = Math.max(0, Math.min((x / fullWidth) * 100, 100));
    swipePct = pct;
    positionSwipe();
  }

  // Drag events on the entire swp view (controls bar + image body)
  // so the handle in the controls bar is also draggable.
  swpView.addEventListener('mousedown', e => { dragging = true; onMove(e.clientX); });
  document.addEventListener('mousemove', e => { if (dragging) { e.preventDefault(); onMove(e.clientX); } });
  document.addEventListener('mouseup', () => dragging = false);
  swpView.addEventListener('touchstart', e => { dragging = true; onMove(e.touches[0].clientX); });
  document.addEventListener('touchmove', e => { if (dragging) onMove(e.touches[0].clientX); });
  document.addEventListener('touchend', () => dragging = false);
}

/* Update divider position and clip-path.
   clip-path uses percentage (scroll-independent, always correct).
   Divider is a child of swp view, positioned in viewport coordinates
   so it stays visible regardless of scroll state.
   We subtract scrollLeft from the wrap offset to keep the divider
   aligned with the visible portion of the image. */
function positionSwipe() {
  const swpView = $('#view-swp');
  const wrap = $('#swipe-wrap');
  const bodyEl = $('#swipe-body');
  const over = $('#swp-over');
  const divider = $('#swipe-divider');
  if (!swpView || !wrap || !bodyEl) return;

  // clip-path on the before overlay (percentage — scroll-independent)
  if (over) over.style.clipPath = `inset(0 ${100 - swipePct}% 0 0)`;

  // Divider pixel position: convert image-relative to viewport-relative
  const swpRect = swpView.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const wrapOffset = wrapRect.left - swpRect.left;
  const xInWrap = (swipePct / 100) * wrap.scrollWidth - bodyEl.scrollLeft;
  if (divider) divider.style.left = (wrapOffset + xInWrap) + 'px';
}

/* Re-position divider on resize or scroll — percentage stays the same
   but pixel positions change as compare-wrap reflows or scrolls. */
window.addEventListener('resize', () => {
  if (currentView === 'swp') positionSwipe();
});
// Scroll handler is attached after buildViews creates the element
function attachSwipeScrollHandler() {
  const bodyEl = $('#swipe-body');
  if (bodyEl) bodyEl.addEventListener('scroll', () => positionSwipe());
}

init();
</script>
</body></html>
