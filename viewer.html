<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>KiCad Diff</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e1e;color:#ccc;font-family:system-ui,sans-serif;font-size:13px;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:6px 12px;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0}
header h1{font-size:13px;font-weight:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:2px;flex-shrink:0}
.tabs button{padding:4px 10px;background:#333;border:1px solid #555;color:#ccc;cursor:pointer;font-size:12px;border-radius:3px}
.tabs button.active{background:#007acc;border-color:#007acc;color:#fff}
/* Header-extras hosts secondary controls (diff highlight toggle, etc.). It
   gets margin-left:auto so the remaining row content (extras + view-tabs)
   is right-aligned, while the row order stays Title → Extras → Tabs. */
.header-extras{display:flex;align-items:center;gap:12px;flex-shrink:0;font-size:12px;margin-left:auto}
.header-extras label{display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}

/* --- Layer panel (KiCad/Photoshop style) ---
   Eye icon: toggles visibility independently
   Row click: selects active layer (rendered on top via z-index boost) */
.layer-panel{display:flex;align-items:stretch;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0}
.layer-list{display:flex;flex-direction:column;min-width:160px;border-right:1px solid #3c3c3c;max-height:180px;overflow-y:auto}
.layer-row{display:flex;align-items:center;gap:6px;padding:2px 8px;cursor:pointer;user-select:none;font-size:12px;border-left:3px solid transparent}
.layer-row:hover{background:#2a2d2e}
.layer-row.active{background:#094771;border-left-color:#007acc}
.layer-row .eye{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.7;flex-shrink:0}
.layer-row .eye:hover{opacity:1}
.layer-row .eye.hidden{opacity:.3}
.layer-row .swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.layer-row .lname{flex:1}
.layer-extras{display:flex;align-items:center;gap:12px;padding:4px 12px;font-size:12px}
.layer-extras label{display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
.lbl-before{color:#f48771}.lbl-after{color:#89d185}

/* --- Page selector (multi-sheet schematic) ---
   Horizontal scrollable tab strip below the file tabs. Shown only for
   hierarchical schematics where there is more than one sheet. */
.page-tabs{display:flex;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0;padding:0 8px;overflow-x:auto;gap:2px}
.page-tabs button{padding:4px 10px;background:transparent;border:none;color:#999;cursor:pointer;font-size:12px;border-bottom:2px solid transparent;white-space:nowrap}
.page-tabs button:hover{color:#ccc;background:#2a2d2e}
.page-tabs button.active{color:#fff;border-bottom-color:#007acc}
.page-tabs button.has-diff{color:#f0a020}
.page-tabs button.has-diff.active{color:#ffc04d;border-bottom-color:#f0a020}

.main{flex:1;overflow:hidden;position:relative}

/* --- Views --- */
.view{display:none;width:100%;height:100%}
.view.active{display:flex}

/* --- Side by side --- */
.sbs{flex-direction:row}
.sbs .pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sbs .pane+.pane{border-left:2px solid #007acc}
.pane-label{font-size:11px;font-weight:600;padding:3px 8px;text-align:center;flex-shrink:0}
.pane-label.before{background:#3e2020;color:#f48771}
.pane-label.after{background:#203e20;color:#89d185}
/* pane-body is the scroll viewport. We use display:flex so the layer-stack
   gets stretched vertically (align-items:stretch is the flex default) — this
   matches the previous layout where the wrap's bounding box was the body
   height, with overflowing image content scrolling. justify-content stays
   at its flex-start default so zoom > 1 leaves scrollbar reach to the
   image's left edge (justify-content:center would clip pan range). */
.pane-body{flex:1;overflow:auto;padding:4px;display:flex}
.pane-body > .layer-stack{width:calc(var(--zoom,1) * 100%);flex-shrink:0}

/* --- Layer stack ---
   Layers are stacked with position:absolute. The first visible layer stays
   position:static to act as a "sizer" that gives the container its dimensions.
   background ensures semi-transparent layers composite against a solid color,
   preventing bleed-through in overlay/swipe modes.
   isolation:isolate contains layer z-indexes within the stack.
   PCB uses dark (#1e1e1e); schematic uses light (#f5f5f5) to match
   KiCad's native schematic background. body[data-type] is set at init time.
   --zoom (CSS var, default 1) scales the rendered area: it's applied to
   .pane-body's direct .layer-stack (sbs view) and to .compare-wrap (ovl/swp).
   width > 100% causes the body's overflow:auto to expose scrollbars for pan. */
.layer-stack{position:relative;display:block;background:#1e1e1e;isolation:isolate;margin:0 auto}
body[data-type="sch"] .layer-stack{background:#f5f5f5}
.layer-stack img{display:block;width:100%;height:auto}
.layer-stack img.layer{position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none}

/* --- Overlay/Swipe shared layout ---
   compare-wrap is the scaled element for ovl/swp views. Width tracks the
   viewport (calc with --zoom): 100% at zoom=1 (fits the body's content area),
   >100% when zoomed in so the body's overflow:auto exposes scrollbars.
   The two layer-stacks (base + over) inside fill compare-wrap completely. */
.compare-wrap{position:relative;width:calc(var(--zoom,1) * 100%);flex-shrink:0}
.compare-wrap .layer-stack{width:100%;margin:0}
/* over-stack sits on top of the base layer-stack, same dimensions.
   background prevents the base from bleeding through semi-transparent
   layers. Color matches the layer-stack (dark for PCB, light for sch). */
.compare-wrap .over-stack{position:absolute;top:0;left:0;width:100%;height:100%;background:#1e1e1e}
body[data-type="sch"] .compare-wrap .over-stack{background:#f5f5f5}
.compare-wrap .over-stack .layer-stack{width:100%}

/* --- Overlay ---
   Same layout pattern as side-by-side: flex-direction:column with a
   fixed-height controls bar on top and a flex:1 scrollable body below.
   This ensures correct resize behavior (matching the pane-body approach). */
.ovl{flex-direction:column;overflow:hidden}
.ovl-controls{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:#2d2d2d;border-bottom:1px solid #3c3c3c;font-size:12px}
.ovl-controls input[type=range]{width:200px;accent-color:#007acc}
/* Scrollable image area. display:flex (without justify-content:center) so
   the compare-wrap gets stretched to body height (bounding-box-wise) while
   any oversized content scrolls left-aligned — flex-start default keeps the
   image's left edge reachable when zoomed > 1. */
.ovl-body{flex:1;overflow:auto;padding:4px;display:flex}

/* --- Swipe ---
   After is the base, before is overlaid with clip-path:inset() to reveal
   only the left portion. This avoids the overflow:hidden + width-sync
   approach which breaks on resize and causes bleed-through.
   Same flex:column + scrollable body pattern as overlay.
   Divider is a direct child of the swp view (not compare-wrap) so it
   spans the full height including the controls bar. The handle sits in
   the controls bar area so it doesn't obscure the image. */
.swp{flex-direction:column;overflow:hidden;position:relative}
/* Controls bar: same height as overlay's, provides visual space for the
   swipe handle and aligns the image start position with overlay mode. */
.swp-controls{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:#2d2d2d;border-bottom:1px solid #3c3c3c;font-size:12px;cursor:col-resize}
.swp-body{flex:1;overflow:auto;padding:4px;cursor:col-resize;display:flex}
/* Divider spans the entire swp view height (controls bar + image body).
   Positioned as a direct child of swp (not compare-wrap) so it extends
   into the controls bar. Left position is computed in JS based on
   compare-wrap's offset to handle centering correctly. */
.swp>.divider{position:absolute;top:0;width:3px;height:100%;background:#007acc;z-index:9999;pointer-events:none}
/* Handle sits in the controls bar area (top:3px aligns with bar padding). */
.swp>.divider::after{content:"\25C0\25B6";position:absolute;top:3px;left:50%;transform:translateX(-50%);background:#007acc;color:#fff;padding:3px 3px;border-radius:4px;font-size:10px;white-space:nowrap}

/* --- Diff highlight ---
   Overlay from ImageMagick compare, with a soft opacity pulse so the change
   is more eye-catching than a static red wash. */
@keyframes diff-pulse{
  0%,100%{opacity:.35}
  50%{opacity:1}
}
.diff-overlay{position:absolute;top:0;left:0;max-width:100%;height:auto;pointer-events:none;mix-blend-mode:multiply;animation:diff-pulse 1.6s ease-in-out infinite}

/* --- File-level tabs (project mode) ---
   Top-level navigation between PCB and Schematic when both are rendered.
   Tabs whose underlying file genuinely changed (before vs. after PNGs differ
   byte-for-byte) get an amber accent so reviewers can spot real diffs at a
   glance — files with no visual change keep the default muted gray. */
.file-tabs{display:flex;background:#252526;border-bottom:1px solid #3c3c3c;flex-shrink:0;padding:0 8px}
.file-tabs button{padding:6px 14px;background:transparent;border:none;color:#999;cursor:pointer;font-size:13px;border-bottom:2px solid transparent}
.file-tabs button:hover{color:#ccc;background:#2a2d2e}
.file-tabs button.active{color:#fff;border-bottom-color:#007acc}
.file-tabs button.has-diff{color:#f0a020}
.file-tabs button.has-diff.active{color:#ffc04d;border-bottom-color:#f0a020}
</style>
</head><body>

<header>
  <h1 id="title"></h1>
  <div class="header-extras" id="header-extras"></div>
  <div class="tabs" id="view-tabs"></div>
</header>
<div class="file-tabs" id="file-tabs" style="display:none"></div>
<div class="page-tabs" id="page-tabs" style="display:none"></div>
<div class="layer-panel" id="layer-panel" style="display:none">
  <div class="layer-list" id="layer-list"></div>
  <div class="layer-extras" id="layer-extras"></div>
</div>
<div class="main" id="main"></div>

<script>
/* MANIFEST is injected as a <script> tag by render.sh before this file.
   New ProjectManifest format: { files: [{ type, file, after, before, diff, ... }] }.
   `M` is the *current* file's manifest (changes when user clicks file tabs). */
if (!window.MANIFEST) {
  document.body.style.cssText = 'display:flex;align-items:center;justify-content:center;color:#f48771';
  document.body.textContent = 'Error: MANIFEST not found. This file must be generated by render.sh.';
  throw new Error('missing MANIFEST');
}
const PROJECT = window.MANIFEST;
/* Display order: schematic first, then PCB, then symbol libraries, then
 *  footprint libraries. Users typically start with the schematic when
 *  reviewing changes. */
const FILE_DISPLAY_ORDER = (() => {
  const idx = PROJECT.files.map((_, i) => i);
  const score = (i) => {
    const t = PROJECT.files[i].type;
    if (t === 'sch') return 0;
    if (t === 'pcb') return 1;
    if (t === 'sym') return 2;
    return 3; // fp
  };
  idx.sort((a, b) => score(a) - score(b));
  return idx;
})();
/* Read initial selection from URL hash (e.g. #file=sch, #file=sym0).
 *  Falls back to the first file in display order. */
function fileIdxFromUrl() {
  const m = location.hash.match(/file=([^&]+)/);
  if (!m) return FILE_DISPLAY_ORDER[0];
  const wanted = decodeURIComponent(m[1]);
  for (let i = 0; i < PROJECT.files.length; i++) {
    if (fileHashKey(PROJECT.files[i], i) === wanted) return i;
  }
  return FILE_DISPLAY_ORDER[0];
}
let currentFileIdx = fileIdxFromUrl();
let M = PROJECT.files[currentFileIdx];
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// --- State ---
// Default view is overlay when there's a before-state (most useful for
// spotting changes); falls back to side-by-side for new files where overlay
// is meaningless. Updated per-file in rebuildForCurrentFile().
let currentView = 'ovl';
let layerVisible = {};  // layer name -> bool (eye icon toggle)
let activeLayer = null; // selected layer name (gets z-index boost to top)
let showDiff = true;  // default ON — diffs are the primary use case
let swipePct = 50;      // swipe divider position in percent
let currentPage = 0;    // multi-sheet schematic page index (0 = root)
let zoomLevel = 1.0;    // 1.0 = fit to container; >1 enlarges (scrollbars pan)
const ZOOM_MIN = 0.25, ZOOM_MAX = 16;

/* Base z-order: bottom to top. The active layer is boosted above all others
   but keeps the same opacity — matching KiCad's behavior where the active
   layer is on top but equally semi-transparent. */
const LAYER_ORDER = ['Edge.Cuts','B.Silkscreen','B.Cu','F.Cu','F.Silkscreen'];
const LAYER_COLORS = {
  'F.Cu':'#c83232','B.Cu':'#3232c8','F.Silkscreen':'#c8c832',
  'B.Silkscreen':'#32c8c8','Edge.Cuts':'#c8c864'
};

// --- Init ---
function init() {
  buildFileTabs();
  rebuildForCurrentFile();
}

/** Re-render UI for the currently selected file. Called on init and on
 *  file-tab change. Resets layer/swipe state to defaults for the new file. */
function rebuildForCurrentFile() {
  M = PROJECT.files[currentFileIdx];
  // Reset per-file state so switching files doesn't carry stale toggles
  layerVisible = {};
  activeLayer = null;
  showDiff = true;
  swipePct = 50;
  // Overlay is the default whenever a before-state exists (most useful for
  // spotting changes); side-by-side is the only option for new files.
  currentView = M.hasBefore ? 'ovl' : 'sbs';
  currentPage = 0;

  $('#title').textContent = M.file;
  document.title = 'KiCad Diff: ' + M.file;
  // Set body data-type for type-specific styling (e.g. sch uses light bg)
  document.body.dataset.type = M.type;

  // Clear UI from previous file (if any)
  $('#view-tabs').innerHTML = '';
  $('#header-extras').innerHTML = '';
  $('#layer-list').innerHTML = '';
  $('#layer-extras').innerHTML = '';
  $('#layer-panel').style.display = 'none';
  $('#layer-list').style.display = '';
  $('#page-tabs').innerHTML = '';
  $('#page-tabs').style.display = 'none';
  $('#main').innerHTML = '';

  buildPageTabs();
  buildTabs();
  buildLayerPanel();
  buildViews();
  setView(currentView);
  // applyDiff after buildViews creates the diff overlay images
  applyDiff();
}

/** Build a horizontal tab strip for selectable pages within a file.
 *  Used for: multi-sheet schematics, symbol libraries (each symbol),
 *  and footprint libraries (each footprint). Shown only when
 *  M.after.pages exists and has more than one entry. Page index 0 is
 *  the default (root sheet for sch, first symbol/footprint for sym/fp). */
function buildPageTabs() {
  const pages = (M.after && M.after.pages) || [];
  const supports = (M.type === 'sch' || M.type === 'sym' || M.type === 'fp');
  if (!supports || pages.length <= 1) return;
  const bar = $('#page-tabs');
  bar.style.display = 'flex';
  pages.forEach((p, idx) => {
    const btn = document.createElement('button');
    btn.textContent = p.name;
    btn.dataset.pageIdx = String(idx);
    if (idx === currentPage) btn.classList.add('active');
    if (p.hasDiff) btn.classList.add('has-diff');
    btn.onclick = () => {
      if (idx === currentPage) return;
      currentPage = idx;
      $$('#page-tabs button').forEach(b => b.classList.toggle('active', Number(b.dataset.pageIdx) === idx));
      // Re-render only the views (page selection doesn't affect tabs/layers)
      $('#main').innerHTML = '';
      buildViews();
      setView(currentView);
      applyDiff();
    };
    bar.appendChild(btn);
  });
}

/** Build a label for a file tab. Schematic and PCB get their type names;
 *  sym/fp use the file's basename so multiple libraries are distinguishable. */
function fileTabLabel(f) {
  if (f.type === 'pcb') return 'PCB';
  if (f.type === 'sch') return 'Schematic';
  // For sym/fp, derive a short name from the file path
  const base = (f.file || '').split('/').pop() || f.file || '';
  const stem = base.replace(/\.kicad_(sym|mod)$/, '').replace(/\.pretty$/, '');
  return f.type === 'sym' ? `Sym: ${stem}` : `FP: ${stem}`;
}

/** Build a hash key for a file tab. The URL hash uses a unique key per file
 *  so multiple sym/fp libraries can each be addressed. */
function fileHashKey(f, idx) {
  if (f.type === 'pcb' || f.type === 'sch') return f.type;
  // For sym/fp, append the index so multiple libraries each get a stable key
  return `${f.type}${idx}`;
}

/** Top-level file tabs shown only when 2+ files are present.
 *  Schematic is rendered first (left) and is the default when no URL hash. */
function buildFileTabs() {
  if (PROJECT.files.length < 2) return;
  const bar = $('#file-tabs');
  bar.style.display = 'flex';
  for (const idx of FILE_DISPLAY_ORDER) {
    const f = PROJECT.files[idx];
    const btn = document.createElement('button');
    btn.textContent = fileTabLabel(f);
    btn.dataset.fileIdx = String(idx);
    if (idx === currentFileIdx) btn.classList.add('active');
    // Mark tabs with real visual changes so reviewers can scan for diffs
    if (f.hasDiff) btn.classList.add('has-diff');
    btn.onclick = () => {
      if (idx === currentFileIdx) return;
      currentFileIdx = idx;
      // Persist selection in URL hash so reload / navigation preserves state
      history.replaceState(null, '', `#file=${fileHashKey(PROJECT.files[idx], idx)}`);
      $$('#file-tabs button').forEach(b => b.classList.toggle('active', Number(b.dataset.fileIdx) === idx));
      rebuildForCurrentFile();
    };
    bar.appendChild(btn);
  }
}

// React to manual hash edits (back/forward navigation, copy-pasted URL)
window.addEventListener('hashchange', () => {
  const idx = fileIdxFromUrl();
  if (idx === currentFileIdx) return;
  currentFileIdx = idx;
  $$('#file-tabs button').forEach(b => b.classList.toggle('active', Number(b.dataset.fileIdx) === idx));
  rebuildForCurrentFile();
});

function buildTabs() {
  const tabs = $('#view-tabs');
  // All three view modes are always available. Without a before-state to
  // compare to, each mode collapses to "just show the rendered image" — the
  // tabs stay so the file's UI is consistent across files (e.g. switching
  // file-tabs from a diff'd file to a new file doesn't yank the controls).
  // Overlay is the default and leftmost — it's the most useful for spotting
  // changes when before is present.
  const modes = [['ovl','Overlay'],['sbs','Side by Side'],['swp','Swipe']];
  modes.forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.dataset.view = id;
    btn.onclick = () => setView(id);
    tabs.appendChild(btn);
  });
}

/* Options panel: shows layer list (PCB only) and diff highlight toggle.
   PCB: KiCad/Photoshop-style layer list with eye icons + active selection
   Schematic: only the diff toggle is shown (no layer concept)
   Hidden entirely if neither layers nor diff are available. */
function buildLayerPanel() {
  const hasLayers = M.type === 'pcb' && M.after.layers;
  const hasDiff = M.diff && M.hasBefore;
  // The panel itself is only useful when there are layers (PCB). The diff
  // toggle lives in the header now, so sch/sym/fp don't need this panel.
  if (hasLayers) {
    const panel = $('#layer-panel');
    panel.style.display = 'flex';
  }
  const list = $('#layer-list');

  const available = hasLayers ? LAYER_ORDER.filter(n => M.after.layers[n]) : [];

  available.forEach(name => {
    layerVisible[name] = true;
    const row = document.createElement('div');
    row.className = 'layer-row';
    row.dataset.layer = name;

    const eye = document.createElement('div');
    eye.className = 'eye';
    eye.textContent = '\u{1F441}';
    eye.title = 'Toggle visibility';
    eye.addEventListener('click', e => {
      e.stopPropagation(); // Don't trigger row selection
      layerVisible[name] = !layerVisible[name];
      eye.classList.toggle('hidden', !layerVisible[name]);
      applyLayers();
    });

    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.style.background = LAYER_COLORS[name] || '#888';

    const lname = document.createElement('div');
    lname.className = 'lname';
    lname.textContent = name;

    row.appendChild(eye);
    row.appendChild(swatch);
    row.appendChild(lname);
    row.addEventListener('click', () => {
      // Toggle: click again to deselect
      activeLayer = (activeLayer === name) ? null : name;
      $$('.layer-row').forEach(r => r.classList.toggle('active', r.dataset.layer === activeLayer));
      applyLayers();
    });
    list.appendChild(row);
  });

  // Default active layer (PCB only)
  if (hasLayers) {
    activeLayer = 'F.Cu';
    const defaultRow = list.querySelector('[data-layer="F.Cu"]');
    if (defaultRow) defaultRow.classList.add('active');
  }

  // Diff highlight toggle goes into the header row (next to title and view
  // tabs) so it's discoverable for sch/sym/fp where there's no layer panel
  // at all. Works for any file type that has both before+after with a diff.
  if (hasDiff) {
    const extras = $('#header-extras');
    const diffLbl = document.createElement('label');
    const diffCb = document.createElement('input');
    diffCb.type = 'checkbox';
    diffCb.checked = showDiff;
    diffCb.addEventListener('change', () => { showDiff = diffCb.checked; applyDiff(); });
    diffLbl.appendChild(diffCb);
    diffLbl.appendChild(document.createTextNode(' Diff highlight'));
    extras.appendChild(diffLbl);
    // Apply initial state so the overlay is shown immediately
    applyDiff();
  }
}

function setView(id) {
  currentView = id;
  $$('.view').forEach(v => v.classList.remove('active'));
  $$('#view-tabs button').forEach(b => b.classList.remove('active'));
  const el = $(`#view-${id}`);
  if (el) el.classList.add('active');
  const btn = $(`#view-tabs button[data-view="${id}"]`);
  if (btn) btn.classList.add('active');
  applyLayers();
  if (id === 'swp') requestAnimationFrame(() => positionSwipe());
}

/* --- Zoom + pan ---
 *  Wheel scrolls inside the active view's body trigger zoom (around the
 *  cursor); pan is just the body's native scrollbars. We update the
 *  --zoom CSS variable on the active body, scaling the layer-stack /
 *  compare-wrap to (zoom * 100%) of the body width. Re-runs positionSwipe
 *  so the divider stays accurate when zoom changes the wrap's geometry. */
function applyZoom() {
  document.documentElement.style.setProperty('--zoom', String(zoomLevel));
  if (currentView === 'swp') positionSwipe();
}

/** Find the scrollable body element of the active view. */
function activeBody() {
  if (currentView === 'sbs') return $('#view-sbs .pane-body');
  if (currentView === 'ovl') return $('.ovl-body');
  if (currentView === 'swp') return $('#swipe-body');
  return null;
}

/** Wheel handler: zoom around the cursor so the point under the mouse
 *  stays put after the zoom (matches what users expect from CAD/image tools). */
function onWheel(e) {
  // Only handle wheels that originate inside one of the scrollable bodies.
  const body = e.target.closest('.pane-body, .ovl-body, .swp-body');
  if (!body) return;
  e.preventDefault();

  const rect = body.getBoundingClientRect();
  // Mouse position relative to body's content (i.e. accounting for scroll)
  const mx = e.clientX - rect.left + body.scrollLeft;
  const my = e.clientY - rect.top + body.scrollTop;

  const oldZoom = zoomLevel;
  // ~10% per notch; deltaY is positive when scrolling down (zoom out)
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, oldZoom * factor));
  if (newZoom === oldZoom) return;
  zoomLevel = newZoom;
  applyZoom();

  // Keep the same content point under the cursor: scale mouse coords by the
  // zoom ratio and subtract the cursor offset within the body.
  const ratio = newZoom / oldZoom;
  body.scrollLeft = mx * ratio - (e.clientX - rect.left);
  body.scrollTop = my * ratio - (e.clientY - rect.top);
}

document.addEventListener('wheel', onWheel, { passive: false });

/* Render a friendly label for a git ref. Used in pane labels and the
   overlay/swipe legends. Empty/unset toRef means "working tree" (the
   default — uncommitted edits in the file). */
function refLabel(ref) {
  if (ref === undefined || ref === null || ref === '') return 'working tree';
  // Truncate full 40-char SHAs to 7 chars (git short-style); leave named
  // refs (HEAD, main, tag names) untouched.
  if (/^[0-9a-f]{40}$/i.test(ref)) return ref.slice(0, 7);
  return ref;
}

const FROM_LABEL = () => refLabel(M.fromRef ?? 'HEAD');
const TO_LABEL = () => refLabel(M.toRef ?? '');

// --- Build views ---
function buildViews() {
  const main = $('#main');
  main.innerHTML = '';

  // Side by side: panes with synchronized scrolling
  const sbs = document.createElement('div');
  sbs.id = 'view-sbs'; sbs.className = 'view sbs';
  if (M.hasBefore) sbs.appendChild(makePane('before', `Before (${FROM_LABEL()})`));
  sbs.appendChild(makePane('after', M.hasBefore ? `After (${TO_LABEL()})` : 'Preview'));
  main.appendChild(sbs);

  // Synchronize scroll between side-by-side panes so the user
  // always sees the same region of the board in both panes.
  if (M.hasBefore) {
    const paneBodies = sbs.querySelectorAll('.pane-body');
    syncScroll([...paneBodies]);
  }

  // Overlay: with before → before+after stacked + opacity slider.
  //          without before → just the after image; the slider/legend would
  //          have nothing to blend, so we skip the controls bar entirely.
  const ovl = document.createElement('div');
  ovl.id = 'view-ovl'; ovl.className = 'view ovl';
  if (M.hasBefore) {
    const ovlCtrl = document.createElement('div');
    ovlCtrl.className = 'ovl-controls';
    // textContent on each span avoids accidental HTML injection if a ref name
    // ever contained markup (unlikely, but git ref names allow many chars).
    const lblBefore = document.createElement('span');
    lblBefore.className = 'lbl-before';
    lblBefore.textContent = `Before (${FROM_LABEL()})`;
    const slider = document.createElement('input');
    slider.type = 'range'; slider.id = 'opacity-slider';
    slider.min = '0'; slider.max = '100'; slider.value = '100';
    const lblAfter = document.createElement('span');
    lblAfter.className = 'lbl-after';
    lblAfter.textContent = `After (${TO_LABEL()})`;
    ovlCtrl.append(lblBefore, slider, lblAfter);
    ovl.appendChild(ovlCtrl);
  }
  const ovlBody = document.createElement('div');
  ovlBody.className = 'ovl-body';
  const ovlWrap = document.createElement('div');
  ovlWrap.className = 'compare-wrap';
  if (M.hasBefore) {
    ovlWrap.appendChild(makeLayerStack('before', 'ovl-before'));
    const ovlOver = document.createElement('div');
    ovlOver.className = 'over-stack'; ovlOver.id = 'ovl-over';
    ovlOver.appendChild(makeLayerStack('after', 'ovl-after'));
    ovlWrap.appendChild(ovlOver);
  } else {
    ovlWrap.appendChild(makeLayerStack('after', 'ovl-after'));
  }
  ovlBody.appendChild(ovlWrap);
  ovl.appendChild(ovlBody);
  main.appendChild(ovl);

  // Swipe: with before → before+after with clip-path divider.
  //        without before → just the after image; no divider/clip.
  const swp = document.createElement('div');
  swp.id = 'view-swp'; swp.className = 'view swp';
  if (M.hasBefore) {
    const swpCtrl = document.createElement('div');
    swpCtrl.className = 'swp-controls';
    const lblBefore = document.createElement('span');
    lblBefore.className = 'lbl-before';
    lblBefore.textContent = `Before (${FROM_LABEL()})`;
    const spacer = document.createElement('span');
    spacer.style.flex = '1';
    const lblAfter = document.createElement('span');
    lblAfter.className = 'lbl-after';
    lblAfter.textContent = `After (${TO_LABEL()})`;
    swpCtrl.append(lblBefore, spacer, lblAfter);
    swp.appendChild(swpCtrl);
  }
  const swpBody = document.createElement('div');
  swpBody.className = 'swp-body'; swpBody.id = 'swipe-body';
  const swpWrap = document.createElement('div');
  swpWrap.className = 'compare-wrap'; swpWrap.id = 'swipe-wrap';
  if (M.hasBefore) {
    swpWrap.appendChild(makeLayerStack('after', 'swp-after'));
    const swpOver = document.createElement('div');
    swpOver.className = 'over-stack'; swpOver.id = 'swp-over';
    swpOver.appendChild(makeLayerStack('before', 'swp-before'));
    swpWrap.appendChild(swpOver);
  } else {
    swpWrap.appendChild(makeLayerStack('after', 'swp-after'));
  }
  swpBody.appendChild(swpWrap);
  swp.appendChild(swpBody);
  if (M.hasBefore) {
    const divider = document.createElement('div');
    divider.className = 'divider'; divider.id = 'swipe-divider';
    swp.appendChild(divider);
  }
  main.appendChild(swp);

  // Wire interactive bits only when before exists — without it, slider/swipe
  // have nothing to do.
  if (M.hasBefore) {
    $('#opacity-slider').addEventListener('input', e => {
      $('#ovl-over').style.opacity = e.target.value / 100;
    });
    setupSwipe();
    attachSwipeScrollHandler();
  }
  applyLayers();
}

function makePane(side, label) {
  const pane = document.createElement('div');
  pane.className = 'pane';
  const lbl = document.createElement('div');
  lbl.className = 'pane-label ' + (side === 'before' ? 'before' : 'after');
  lbl.textContent = label;
  pane.appendChild(lbl);
  const body = document.createElement('div');
  body.className = 'pane-body';
  body.appendChild(makeLayerStack(side, `sbs-${side}`));
  pane.appendChild(body);
  return pane;
}

/* Build a stack of layer images for one side (before or after).
   All layer images start with .layer class (position:absolute).
   applyLayers() promotes the first visible one to position:static (sizer)
   so the container gets its dimensions from the image. */
function makeLayerStack(side, id) {
  const data = M[side];
  const stack = document.createElement('div');
  stack.className = 'layer-stack'; stack.id = id;

  if (data.layers && M.type === 'pcb') {
    LAYER_ORDER.forEach((name, i) => {
      if (!data.layers[name]) return;
      const img = document.createElement('img');
      img.src = data.layers[name];
      img.className = 'layer';
      img.dataset.layer = name; img.dataset.side = side;
      img.style.zIndex = i + 1;
      img.onerror = () => { img.style.display = 'none'; };
      stack.appendChild(img);
    });
  } else {
    // For multi-sheet schematics, prefer the current page's PNG. Falls back
    // to `combined` for PCB and single-sheet sch (no `pages` field).
    const img = document.createElement('img');
    const pageSrc = (data.pages && data.pages[currentPage] && data.pages[currentPage].png) || data.combined;
    img.src = pageSrc;
    img.onerror = () => { img.style.display = 'none'; };
    stack.appendChild(img);
  }

  // Diff highlight overlay (ImageMagick compare output).
  // Only shown on the root page (currentPage === 0) — diff is computed on
  // the combined PNG which is the root sheet for schematics.
  if (M.diff && side === 'after' && currentPage === 0) {
    const diffImg = document.createElement('img');
    diffImg.src = M.diff;
    diffImg.className = 'layer diff-overlay';
    diffImg.style.zIndex = 200;
    diffImg.style.display = 'none';
    diffImg.dataset.diff = '1';
    stack.appendChild(diffImg);
  }

  return stack;
}

// --- Layer state application ---
/* All layers share the same opacity (0.6) regardless of active state.
   This matches KiCad's rendering where the active layer differs only
   in z-order (topmost), not in transparency. */
function applyLayers() {
  const maxBase = LAYER_ORDER.length;
  $$('.layer-stack img[data-layer]').forEach(img => {
    const name = img.dataset.layer;
    img.style.display = layerVisible[name] ? '' : 'none';
    const baseIdx = LAYER_ORDER.indexOf(name);
    img.style.zIndex = (name === activeLayer) ? maxBase + 10 : baseIdx + 1;
    img.style.opacity = '0.6';
  });

  /* Ensure one visible image per stack is position:static (sizer).
     Without a sizer, the inline-block container collapses to zero size. */
  $$('.layer-stack').forEach(stack => {
    const imgs = [...stack.querySelectorAll('img[data-layer]')];
    imgs.forEach(img => img.classList.add('layer'));
    const firstVisible = imgs.find(img => img.style.display !== 'none');
    if (firstVisible) firstVisible.classList.remove('layer');
  });
}

// --- Scroll sync ---
/* Synchronize scroll position across multiple elements (e.g. side-by-side panes).
   When one pane is scrolled, all others follow. A guard flag prevents
   infinite event loops between the scroll handlers. */
function syncScroll(elements) {
  let syncing = false;
  elements.forEach(source => {
    source.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      elements.forEach(target => {
        if (target !== source) {
          target.scrollTop = source.scrollTop;
          target.scrollLeft = source.scrollLeft;
        }
      });
      syncing = false;
    });
  });
}

function applyDiff() {
  $$('[data-diff]').forEach(img => {
    img.style.display = showDiff ? '' : 'none';
  });
}

// --- Swipe ---
/* Uses clip-path:inset() on the before overlay to reveal only the left
   portion. This is simpler and more resize-friendly than the overflow:hidden
   + width-sync approach, and avoids bleed-through at the clip boundary.
   The divider is a direct child of the swp view (not compare-wrap) so it
   spans the full height including the controls bar. Position is calculated
   relative to compare-wrap's bounds to handle centering correctly. */
function setupSwipe() {
  const swpView = $('#view-swp');
  const body = $('#swipe-body');
  if (!swpView || !body) return;
  let dragging = false;

  function onMove(clientX) {
    const wrap = $('#swipe-wrap');
    const bodyEl = $('#swipe-body');
    if (!wrap || !bodyEl) return;
    // Account for horizontal scroll: clientX is viewport-relative, but we
    // need position relative to the full image width (not just visible portion).
    const rect = wrap.getBoundingClientRect();
    const x = clientX - rect.left + bodyEl.scrollLeft;
    const fullWidth = wrap.scrollWidth;
    const pct = Math.max(0, Math.min((x / fullWidth) * 100, 100));
    swipePct = pct;
    positionSwipe();
  }

  // Drag events on the entire swp view (controls bar + image body)
  // so the handle in the controls bar is also draggable.
  swpView.addEventListener('mousedown', e => { dragging = true; onMove(e.clientX); });
  document.addEventListener('mousemove', e => { if (dragging) { e.preventDefault(); onMove(e.clientX); } });
  document.addEventListener('mouseup', () => dragging = false);
  swpView.addEventListener('touchstart', e => { dragging = true; onMove(e.touches[0].clientX); });
  document.addEventListener('touchmove', e => { if (dragging) onMove(e.touches[0].clientX); });
  document.addEventListener('touchend', () => dragging = false);
}

/* Update divider position and clip-path.
   clip-path uses percentage (scroll-independent, always correct).
   Divider is a child of swp view, positioned in viewport coordinates
   so it stays visible regardless of scroll state.
   We subtract scrollLeft from the wrap offset to keep the divider
   aligned with the visible portion of the image. */
function positionSwipe() {
  const swpView = $('#view-swp');
  const wrap = $('#swipe-wrap');
  const bodyEl = $('#swipe-body');
  const over = $('#swp-over');
  const divider = $('#swipe-divider');
  if (!swpView || !wrap || !bodyEl) return;

  // clip-path on the before overlay (percentage — scroll-independent)
  if (over) over.style.clipPath = `inset(0 ${100 - swipePct}% 0 0)`;

  // Divider pixel position: convert image-relative to viewport-relative
  const swpRect = swpView.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  const wrapOffset = wrapRect.left - swpRect.left;
  const xInWrap = (swipePct / 100) * wrap.scrollWidth - bodyEl.scrollLeft;
  if (divider) divider.style.left = (wrapOffset + xInWrap) + 'px';
}

/* Re-position divider on resize or scroll — percentage stays the same
   but pixel positions change as compare-wrap reflows or scrolls. */
window.addEventListener('resize', () => {
  if (currentView === 'swp') positionSwipe();
});
// Scroll handler is attached after buildViews creates the element
function attachSwipeScrollHandler() {
  const bodyEl = $('#swipe-body');
  if (bodyEl) bodyEl.addEventListener('scroll', () => positionSwipe());
}

init();
</script>
</body></html>
