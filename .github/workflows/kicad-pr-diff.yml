# Render a kicadiff visual diff for every PR that touches a KiCad file,
# upload the rendered images + markdown as a build artifact, and post /
# update a sticky PR comment + a section in the PR description so reviewers
# can read the structural change without leaving GitHub.
#
# Why this lives in the kicadiff repo: the same action is published as
# `sksat/kicadiff` for downstream KiCad projects to consume. This workflow
# both dogfoods that action against our own example projects (so a PR that
# breaks rendering shows up here) and acts as a working reference for the
# action's expected wiring.

name: Visual diff (kicadiff)

on:
  pull_request:
    paths:
      # KiCad files we know how to render. Anything outside this list
      # doesn't trigger the workflow — keeps non-design PRs (docs, CI, src
      # changes) free of the heavy KiCad-install spin-up.
      - "**/*.kicad_pcb"
      - "**/*.kicad_sch"
      - "**/*.kicad_sym"
      - "**/*.kicad_mod"
      - "**/*.kicad_pro"
      # Self-test: trigger when the action or this workflow itself changes
      # so PRs that modify the GitHub Actions surface get exercised.
      - "action.yml"
      - ".github/workflows/kicad-pr-diff.yml"

# Sticky-comment + description editing both mutate PR data, so the job
# needs write access to pull-requests. Contents stays read.
permissions:
  contents: read
  pull-requests: write

# Coalesce successive pushes to the same PR so we only render the latest
# state — earlier in-flight runs cancel and free up minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diff:
    name: Render and post diff
    runs-on: ubuntu-latest
    steps:
      # Need both the base and head SHAs accessible for kicadiff to read
      # blobs out of git history. fetch-depth: 0 is overkill but keeps the
      # logic simple — shallow clones miss the merge-base for older PRs.
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          # Check out the PR head explicitly so the working tree reflects
          # what reviewers will see merged. (`actions/checkout` defaults
          # to a synthetic merge ref for pull_request events; we want the
          # actual head so kicadiff's working-tree fallback would too.)
          ref: ${{ github.event.pull_request.head.sha }}

      # The composite action delegates Bun + KiCad install to its own
      # steps, so the only thing we still owe it is the local kicadiff
      # binary on PATH. Doing this here (not inside the action) keeps the
      # action friendly to external consumers who pull it via `bunx`.
      - uses: pnpm/action-setup@v6.0.6
        with:
          version: 10
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # The repo root has a `./kicadiff` symlink to `src/index.ts` (with a
      # #!/usr/bin/env bun shebang). pnpm/npm don't symlink the root
      # package's own bin into node_modules/.bin, so we put the repo root
      # itself on PATH — that makes `kicadiff` invokable directly, which
      # is what install-kicadiff: skip in the action expects.
      - name: Add local kicadiff to PATH
        run: echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"

      # Render the visual diff. The action handles KiCad install, so we
      # don't repeat the PPA dance here.
      - name: kicadiff
        id: kicadiff
        uses: ./
        with:
          # Default `.` covers the whole repo. For projects with multiple
          # boards you'd narrow this to a specific subdirectory.
          path: "."
          output-dir: kicadiff-output
          install-kicadiff: skip

      # Always upload the artifact, even when has-changes=false, so that a
      # reviewer who clicks through still finds an empty-but-valid report
      # rather than a 404. Artifact size is dominated by PNGs and is
      # typically tens of KB to a few MB for a small board.
      - name: Upload artifact
        id: artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: kicadiff-pr-${{ github.event.pull_request.number }}
          path: ${{ steps.kicadiff.outputs.output-dir }}
          # Visual diffs are interesting for the lifetime of the PR review,
          # not forever. 14 days covers most reviews; the artifact survives
          # past PR merge so historical context is available short-term.
          retention-days: 14
          if-no-files-found: warn

      # Job summary: render the kicadiff markdown report inline on the
      # workflow run page so reviewers can read the diff without
      # downloading anything. Image refs in the markdown are relative to
      # the artifact directory and don't resolve from the summary's
      # context, so we strip them and link to the artifact for the rich
      # version. Step summary is capped at 1 MiB; the structural diff
      # alone fits comfortably even for large boards.
      - name: Write job summary
        env:
          MD_PATH: ${{ steps.kicadiff.outputs.markdown-path }}
          TXT_PATH: ${{ steps.kicadiff.outputs.text-path }}
          HAS_CHANGES: ${{ steps.kicadiff.outputs.has-changes }}
          ARTIFACT_URL: ${{ steps.artifact.outputs.artifact-url }}
        run: |
          set -eu
          {
            echo '## 🔍 KiCad visual diff'
            echo
            if [ "$HAS_CHANGES" = "true" ]; then
              echo "Structural change detected."
            else
              echo "No structural change detected — the rendered output is byte-identical between base and head."
            fi
            echo
            if [ -n "${ARTIFACT_URL:-}" ]; then
              echo "**Full report with images:** [download artifact]($ARTIFACT_URL)"
            else
              echo "**Full report with images:** see the *Artifacts* section below."
            fi
            echo
            # Inline the kicadiff markdown report, but with image lines
            # stripped: the markdown's relative `![](after/...)` refs
            # would render as broken images on the run page since job
            # summaries don't get the artifact filesystem mounted. The
            # structural section still has all the info that matters.
            if [ -s "$MD_PATH" ]; then
              # Drop standalone image lines and the surrounding table
              # syntax that wraps them; keep headings, prose, and the
              # structural diff verbatim. Also cap at 900 KiB to leave
              # headroom under the 1 MiB summary limit.
              sed -E '/!\[[^]]*\]\([^)]+\)/d' "$MD_PATH" \
                | head -c 921600
            elif [ -s "$TXT_PATH" ]; then
              echo '```diff'
              head -c 921600 "$TXT_PATH"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Build a body that we can paste into both the PR comment and the PR
      # description. Markers around the body let us idempotently replace
      # the section on subsequent runs without stomping on hand-edited
      # parts of the description.
      - name: Compose comment / description body
        id: body
        env:
          TXT_PATH: ${{ steps.kicadiff.outputs.text-path }}
          HAS_CHANGES: ${{ steps.kicadiff.outputs.has-changes }}
          ARTIFACT_NAME: kicadiff-pr-${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          {
            echo '<!-- kicadiff:start -->'
            echo '## 🔍 KiCad visual diff'
            echo
            if [ "$HAS_CHANGES" = "true" ]; then
              echo "Structural change detected by [kicadiff](https://github.com/sksat/kicadiff)."
            else
              echo "No structural change detected — the rendered output is byte-identical between base and head."
            fi
            echo
            echo "**Full report (with images):** [download \`$ARTIFACT_NAME\`]($RUN_URL#artifacts)"
            echo
            # Drop the structural diff inline. Cap the size so a giant
            # board doesn't blow GitHub's 65k comment limit; the artifact
            # always carries the full report.
            if [ -s "$TXT_PATH" ]; then
              echo '<details><summary>Structural diff</summary>'
              echo
              echo '```diff'
              head -c 50000 "$TXT_PATH"
              if [ "$(wc -c < "$TXT_PATH")" -gt 50000 ]; then
                echo
                echo '... (truncated — full diff in the artifact)'
              fi
              echo '```'
              echo
              echo '</details>'
            fi
            echo
            echo '<!-- kicadiff:end -->'
          } > body.md
          # Expose the path; multi-line outputs go through GITHUB_OUTPUT
          # via the heredoc form to survive trailing-newline issues.
          {
            echo "path=body.md"
          } >> "$GITHUB_OUTPUT"

      # Sticky comment: find a previous kicadiff comment by marker and
      # update it in place; otherwise post a fresh one. This avoids
      # spamming the PR with a new comment on every push.
      - name: Upsert sticky PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          BODY_PATH: ${{ steps.body.outputs.path }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # gh api returns the comment list; we look for the one whose
          # body opens with our marker. Limiting to the first matching
          # comment is fine — we never post more than one ourselves.
          existing=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq '.[] | select(.body | startswith("<!-- kicadiff:start -->")) | .id' \
            | head -n 1)
          if [ -n "$existing" ]; then
            echo "Updating existing kicadiff comment $existing"
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" \
              -F "body=@$BODY_PATH" > /dev/null
          else
            echo "Posting new kicadiff comment"
            gh pr comment "$PR" --repo "$REPO" --body-file "$BODY_PATH"
          fi

      # Description: insert/update a kicadiff section between markers.
      # Hand-written content outside the markers is preserved.
      - name: Upsert PR description section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          BODY_PATH: ${{ steps.body.outputs.path }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # Pull the current description, splice our block in (replacing
          # an existing kicadiff:start..end block if present, appending
          # otherwise), and write it back. We use python for the splice
          # because awk/sed make multi-line replacement awkward and gh
          # itself can't operate on file paths for description edits.
          # Pass the current body and new section through env vars so the
          # python here-doc doesn't have to wrestle with shell quoting.
          export CURRENT_BODY
          CURRENT_BODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq .body)
          export NEW_SECTION
          NEW_SECTION=$(cat "$BODY_PATH")
          python3 - <<'PY' > new_body.md
          import os, re, sys
          current = os.environ.get("CURRENT_BODY", "")
          new = os.environ["NEW_SECTION"]
          pattern = re.compile(
              r"<!-- kicadiff:start -->.*?<!-- kicadiff:end -->",
              re.DOTALL,
          )
          if pattern.search(current):
              out = pattern.sub(new, current)
          else:
              # Blank-line separator so the section doesn't fuse with
              # whatever the PR author wrote above it.
              sep = "\n\n" if current.strip() else ""
              out = current + sep + new
          sys.stdout.write(out)
          PY
          gh pr edit "$PR" --repo "$REPO" --body-file new_body.md
